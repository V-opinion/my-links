<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .profile-container {
            text-align: center;
            margin-bottom: 24px;
        }
        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
            object-fit: cover;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 1.25rem;
            margin: 0;
            color: #f8fafc;
        }
        p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin: 4px 0 0 0;
        }
        .links-container {
            width: 100%;
            max-width: 400px;
        }
        .link-btn {
            display: block;
            background-color: #1e293b;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .link-btn:hover {
            background-color: #334155;
            border-color: #38bdf8;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

  <div class="profile-container">
    <!-- Your main profile image -->
    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200" alt="Profile Picture" class="profile-pic">
    
    <!-- Use the handle that matches your domain name here -->
    <h1>@multireligionval</h1> 
    <p>Official Links & Updates</p>
</div>

<div class="links-container">
    <!-- Put your X / Twitter link right at the top of the stack -->
    <a href="https://x.com/DPNS" class="link-btn" target="_blank">🐦 Follow my updates on X (@DPNS)</a>
    <a href="https://instagram.com/multireligionval" class="link-btn" target="_blank">📸 Connect on Instagram</a>
</div>

</body>
</html>
