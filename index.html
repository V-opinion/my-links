<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .profile-container {
            text-align: center;
            margin-bottom: 24px;
        }
        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
            object-fit: cover;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 1.25rem;
            margin: 0;
            color: #f8fafc;
        }
        p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin: 4px 0 0 0;
        }
        .links-container {
            width: 100%;
            max-width: 400px;
        }
        .link-btn {
            display: block;
            background-color: #1e293b;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .link-btn:hover {
            background-color: #334155;
            border-color: #38bdf8;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200" alt="Profile Picture" class="profile-pic">
        <h1>@YourHandle</h1>
        <p>Creator & Developer</p>
    </div>

    <div class="links-container">
        <a href="https://yourwebsite.com" class="link-btn" target="_blank">🌐 Visit My Website</a>
        <a href="https://youtube.com" class="link-btn" target="_blank">📺 Watch My Videos</a>
        <a href="https://twitter.com" class="link-btn" target="_blank">🐦 Follow Me on X</a>
    </div>

</body>
</html>
